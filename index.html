<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>itzyagirlalessia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #07050F;
      --surface: #100D20;
      --purple:  #A855F7;
      --pink:    #EC4899;
      --text:    #F0EEFF;
      --muted:   #6B6880;
    }

    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 450px; height: 450px;
      background: var(--purple);
      top: -120px; right: -120px;
      animation: float 9s ease-in-out infinite;
    }
    .orb-2 {
      width: 350px; height: 350px;
      background: var(--pink);
      bottom: -100px; left: -100px;
      animation: float 11s ease-in-out infinite reverse;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(30px, -30px); }
    }

    /* Star field */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      animation: twinkle var(--d) var(--delay) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0;   transform: scale(0.5); }
      50%       { opacity: 0.7; transform: scale(1.2); }
    }

    /* Main card */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 680px;
      width: 100%;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* Animated gradient name */
    .name-itzy {
      display: block;
      font-size: clamp(3.2rem, 13vw, 7.5rem);
      font-weight: 700;
      line-height: 0.88;
      background: linear-gradient(135deg, var(--purple), var(--pink), var(--purple));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
      filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.35));
    }

    .name-alessia {
      display: block;
      font-size: clamp(3.2rem, 13vw, 7.5rem);
      font-weight: 300;
      line-height: 0.88;
      color: var(--text);
      letter-spacing: -0.02em;
      margin-bottom: 2.5rem;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .tagline {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.06em;
      margin-bottom: 3rem;
    }

    /* Social link buttons */
    .links {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.6rem 1.35rem;
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 100px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.85rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      background: rgba(168, 85, 247, 0.05);
      transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .link-btn:hover {
      border-color: var(--purple);
      background: rgba(168, 85, 247, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(168, 85, 247, 0.18);
    }

    .link-btn svg { flex-shrink: 0; }

    /* Divider spark */
    .spark {
      display: inline-block;
      margin: 0 0.5rem;
      color: var(--purple);
      opacity: 0.5;
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    @media (max-width: 480px) {
      .links { gap: 0.5rem; }
      .link-btn { padding: 0.5rem 1rem; font-size: 0.8rem; }
    }
  </style>
</head>

  <script>
    // Generate twinkling star field
    const container = document.getElementById('stars');
    for (let i = 0; i < 70; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() < 0.2 ? 3 : 2;
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        top:  ${Math.random() * 100}%;
        width:  ${size}px;
        height: ${size}px;
        --d:     ${2 + Math.random() * 4}s;
        --delay: ${Math.random() * 7}s;
      `;
      container.appendChild(s);
    }
  </script>
