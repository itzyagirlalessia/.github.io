<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — itzyagirlalessia</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #07050F;
      --purple: #A855F7;
      --pink:   #EC4899;
      --text:   #F0EEFF;
      --muted:  #6B6880;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
      position: relative;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.15;
      pointer-events: none;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--purple); top: -100px; right: -100px; animation: float 9s ease-in-out infinite; }
    .orb-2 { width: 300px; height: 300px; background: var(--pink); bottom: -80px; left: -80px; animation: float 11s ease-in-out infinite reverse; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50%       { transform: translate(30px, -30px); }
    }

    .stars { position: fixed; inset: 0; pointer-events: none; }
    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      animation: twinkle var(--d) var(--delay) infinite ease-in-out;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%       { opacity: 0.7; transform: scale(1.2); }
    }

    .container { position: relative; z-index: 1; max-width: 480px; }

    .code {
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--purple), var(--pink), var(--purple));
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease infinite;
      filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.35));
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .message {
      font-size: 1.1rem;
      font-weight: 300;
      color: var(--muted);
      margin: 1rem 0 2.5rem;
      line-height: 1.6;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.6rem;
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 100px;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      background: rgba(168, 85, 247, 0.07);
      transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .home-btn:hover {
      border-color: var(--purple);
      background: rgba(168, 85, 247, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(168, 85, 247, 0.2);
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="stars" id="stars"></div>

  <div class="container">
    <p class="code">404</p>
    <p class="message">oops, this page doesn't exist.<br>looks like you got a little lost ✦</p>
    <a href="/" class="home-btn">
      ← take me home
    </a>
  </div>

  <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() < 0.2 ? 3 : 2;
      s.style.cssText = `
        left: ${Math.random() * 100}%;
        top:  ${Math.random() * 100}%;
        width:  ${size}px;
        height: ${size}px;
        --d:     ${2 + Math.random() * 4}s;
        --delay: ${Math.random() * 7}s;
      `;
      container.appendChild(s);
    }
  </script>
</body>
</html>
