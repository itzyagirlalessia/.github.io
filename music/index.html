<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music — itzyagirlalessia</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg: #07050F; --purple: #A855F7; --pink: #EC4899; --green: #1DB954; --text: #F0EEFF; --muted: #6B6880; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.15; pointer-events: none; z-index: 0; }
    .orb-1 { width: 450px; height: 450px; background: var(--purple); top: -120px; right: -120px; animation: float 9s ease-in-out infinite; }
    .orb-2 { width: 350px; height: 350px; background: var(--pink); bottom: -100px; left: -100px; animation: float 11s ease-in-out infinite reverse; }
    @keyframes float { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px,-30px); } }
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; border-radius: 50%; background: #fff; opacity: 0; animation: twinkle var(--d) var(--delay) infinite ease-in-out; }
    @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.7; transform: scale(1.2); } }
    .container { position: relative; z-index: 1; text-align: center; padding: 2rem 1.5rem; max-width: 680px; width: 100%; }
    .nav { display: flex; justify-content: center; gap: 0.25rem; margin-bottom: 2.5rem; background: rgba(255,255,255,0.04); border-radius: 100px; padding: 0.25rem; width: fit-content; margin-left: auto; margin-right: auto; }
    .nav a { color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.45rem 1.2rem; border-radius: 100px; text-decoration: none; transition: color 0.2s, background 0.2s; }
    .nav a.active { background: rgba(168,85,247,0.2); color: var(--text); }
    .nav a:hover:not(.active) { color: var(--text); }
    .music-label { font-size: 0.7rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
    .spotify-wrap { border-radius: 18px; overflow: hidden; box-shadow: 0 0 40px rgba(29,185,84,0.1); }
    .open-btn { display: inline-flex; align-items: center; gap: 0.45rem; padding: 0.6rem 1.35rem; border: 1px solid rgba(29,185,84,0.25); border-radius: 100px; color: var(--text); text-decoration: none; font-size: 0.85rem; font-family: 'Space Grotesk', sans-serif; font-weight: 500; background: rgba(29,185,84,0.05); margin-top: 1.25rem; transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s; }
    .open-btn:hover { border-color: var(--green); background: rgba(29,185,84,0.12); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(29,185,84,0.18); }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }

    /* Page transitions */
    @keyframes pageIn  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pageOut { from { opacity: 1; transform: translateY(0); }   to { opacity: 0; transform: translateY(-20px); } }
    .container { animation: pageIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .container.leaving { animation: pageOut 0.3s ease forwards; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="stars" id="stars"></div>
  <main class="container">
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/about-me/">About me</a>
      <a href="/music/" class="active">Music</a>
    </nav>
    <p class="music-label">streaming on</p>
    <div class="spotify-wrap">
      <iframe
        src="https://open.spotify.com/embed/artist/4NGeSgZPTvOYiQLOzD28NI?utm_source=generator&theme=0"
        width="100%" height="420" frameborder="0"
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
        loading="lazy" style="border-radius:16px;">
      </iframe>
    </div>
    <a href="https://open.spotify.com/artist/4NGeSgZPTvOYiQLOzD28NI" class="open-btn" target="_blank" rel="noopener">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
      Open in Spotify
    </a>
  </main>
  <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 70; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() < 0.2 ? 3 : 2;
      s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${size}px;height:${size}px;--d:${2+Math.random()*4}s;--delay:${Math.random()*7}s;`;
      container.appendChild(s);
    }

    // Page exit animation
    document.querySelectorAll('.nav a:not(.active)').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const href = this.href;
        document.querySelector('.container').classList.add('leaving');
        setTimeout(() => { window.location.href = href; }, 300);
      });
    });
  </script>
</body>
</html>
